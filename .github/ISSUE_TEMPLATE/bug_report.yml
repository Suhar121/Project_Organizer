name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short bug summary
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser
      placeholder: Windows 11, Node 22.x, Chrome ...

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste screenshots or terminal output
